<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Wallet Tracker Ledger v11 - Allocation Section</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: top; }
    th { background-color: #4CAF50; color: white; font-weight: bold; }
    input { width: 100px; }
    button { cursor: pointer; }
    ul { margin: 0; padding-left: 20px; list-style-type: none; }
    li { margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
    .note-text { display: flex; flex: 1; }
    .note-amounts { font-weight: bold; width: 150px; text-align: right; margin-right: 10px; }
    .note-description { flex: 1; }
    .edit-btn { background-color: #2196F3; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-left: 5px; }
    .del-btn { background-color: #f44336; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-left: 5px; }
    .del-row-btn { background-color: #9c27b0; color: white; border: none; padding: 3px 7px; font-size: 12px; margin-left: 5px; }

    /* Allocation Section */
    .allocation-section { background: white; padding: 15px; border-radius: 6px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
    .allocation-table td { height: 40px; }

    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-10px); }
        60% { transform: translateY(-5px); }
    }
    .header-bounce { 
        font-size: 16px; 
        font-weight: bold; 
        text-align: center; 
        margin-bottom: 20px; 
        animation: bounce 2s infinite; 
    }
</style>
</head>
<body>

<div class="header-bounce">Made By Capt Fahad | Powered By AI</div>

<h1>📊 Crypto Wallet Tracker Ledger v11 (Realtime)</h1>

<table id="walletTable">
    <thead>
        <tr>
            <th>Wallet / Account</th>
            <th>Balance</th>
            <th>Currency</th>
            <th>Notes / Transfers</th>
            <th>Transfer</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button onclick="addWallet()">➕ Add New Wallet</button>

<h2>Total Balance: $<span id="totalBalance">0</span></h2>

<!-- ================= ALLOCATION SECTION ================= -->

<div class="allocation-section">
    <h2>📌 Allocation / Notes</h2>

    <table id="allocationTable" class="allocation-table">
        <thead>
            <tr>
                <th>Allocation / Title</th>
                <th>Details / Notes</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button onclick="addAllocationRow()">➕ Add Allocation</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPgCWfTeRUebCCVeEwxnAXOWYX1dxwhZE",
  authDomain: "crypto-ledger-6d5fb.firebaseapp.com",
  projectId: "crypto-ledger-6d5fb",
  storageBucket: "crypto-ledger-6d5fb.firebasestorage.app",
  messagingSenderId: "344600389752",
  appId: "1:344600389752:web:aacb60ca86a397cd53658d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= EXISTING FUNCTIONS (UNCHANGED CORE) ================= */

function calculateTotal(){
    let total = 0;
    document.querySelectorAll('.balance').forEach(cell=>{
        let val = parseFloat(cell.textContent);
        if(isNaN(val)) val = 0;
        total += val;
    });
    document.getElementById('totalBalance').textContent = total.toFixed(2);
}

/* ================= ALLOCATION SECTION FUNCTIONS ================= */

function loadAllocationsRealtime(){
    db.collection("allocations").orderBy("createdAt").onSnapshot(snapshot=>{
        const tbody = document.querySelector("#allocationTable tbody");
        tbody.innerHTML = "";

        snapshot.forEach(doc=>{
            const data = doc.data();

            const row = tbody.insertRow();
            row.dataset.id = doc.id;

            const cell1 = row.insertCell();
            const cell2 = row.insertCell();

            cell1.contentEditable = true;
            cell2.contentEditable = true;

            cell1.textContent = data.title || "";
            cell2.textContent = data.details || "";

            cell1.addEventListener('input', saveAllocationRow);
            cell2.addEventListener('input', saveAllocationRow);
        });
    });
}

function addAllocationRow(){
    const id = db.collection("allocations").doc().id;

    db.collection("allocations").doc(id).set({
        title: "",
        details: "",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
}

function saveAllocationRow(e){
    const row = e.target.parentElement;
    const id = row.dataset.id;

    const title = row.cells[0].textContent;
    const details = row.cells[1].textContent;

    if(!id) return;

    db.collection("allocations").doc(id).set({
        title,
        details,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
}

/* ================= INIT ================= */

loadAllocationsRealtime();

</script>

</body>
</html>

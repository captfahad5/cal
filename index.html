<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Ledger Live</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: top; }
th { background-color: #4CAF50; color: white; font-weight: bold; }
input { width: 100px; }
button { cursor: pointer; }
ul { margin: 0; padding-left: 20px; list-style-type: none; }
li { margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
.note-text { display: flex; }
.note-amounts { font-weight: bold; width: 150px; text-align: right; margin-right: 10px; }
.note-description { flex: 1; }
.edit-btn { background-color: #2196F3; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-right: 5px; }
.del-btn { background-color: #f44336; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-left: 5px; }
.del-row-btn { background-color: #9c27b0; color: white; border: none; padding: 3px 7px; font-size: 12px; margin-left: 5px; }
</style>
</head>
<body>

<h1>📊 Crypto Wallet Tracker Live</h1>

<table id="walletTable">
<thead>
<tr>
<th>Wallet / Account</th>
<th>Balance</th>
<th>Currency</th>
<th>Notes / Transfers</th>
<th>Transfer</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button id="addWalletBtn">➕ Add New Wallet</button>
<h2>Total Balance: $<span id="totalBalance">0</span></h2>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyAPgCWfTeRUebCCVeEwxnAXOWYX1dxwhZE",
  authDomain: "crypto-ledger-6d5fb.firebaseapp.com",
  projectId: "crypto-ledger-6d5fb",
  storageBucket: "crypto-ledger-6d5fb.firebasestorage.app",
  messagingSenderId: "344600389752",
  appId: "1:344600389752:web:aacb60ca86a397cd53658d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const walletsCol = collection(db, "wallets");

// --- Functions ---

function addWalletRow(walletData, walletId){
    const tbody = document.getElementById('walletTable').getElementsByTagName('tbody')[0];
    const row = document.createElement('tr');
    row.dataset.id = walletId;
    row.innerHTML = `
        <td contenteditable="true">${walletData.name}</td>
        <td class="balance">${walletData.balance.toFixed(2)}</td>
        <td contenteditable="true">${walletData.currency}</td>
        <td class="notes"><ul></ul></td>
        <td>
            <input type="number" placeholder="Amount">
            <input type="text" placeholder="Note">
            <button class="add-btn">Add</button>
            <button class="sub-btn">Subtract</button>
            <button class="del-row-btn">DEL ROW</button>
        </td>
    `;
    tbody.appendChild(row);

    const notesList = row.querySelector('.notes ul');
    walletData.notes.forEach(note=>{
        const li = document.createElement('li');
        li.dataset.note = note.text;
        li.amounts = [...note.amounts];

        const noteWrapper = document.createElement('span');
        noteWrapper.className = 'note-text';
        const amountSpan = document.createElement('span');
        amountSpan.className = 'note-amounts';
        amountSpan.textContent = li.amounts.join(' ');
        const noteDescSpan = document.createElement('span');
        noteDescSpan.className = 'note-description';
        noteDescSpan.textContent = `| ${note.text}`;
        noteWrapper.appendChild(amountSpan);
        noteWrapper.appendChild(noteDescSpan);
        li.appendChild(noteWrapper);

        const editBtn = document.createElement('button');
        editBtn.textContent='Edit';
        editBtn.className='edit-btn';
        editBtn.onclick=async()=>{
            const newAmount=parseFloat(prompt('Enter amount to add/subtract:'));
            if(!isNaN(newAmount)){
                const type=confirm('OK for Add, Cancel for Subtract')?'add':'subtract';
                li.amounts.push((type==='add'?'+':'-')+newAmount);
                amountSpan.textContent=li.amounts.join(' ');

                const balanceCell = row.querySelector('.balance');
                let bal=parseFloat(balanceCell.textContent);
                bal += (type==='add'?newAmount:-newAmount);
                balanceCell.textContent = bal.toFixed(2);

                const walletDoc=doc(db,"wallets",walletId);
                const updatedNotes=[...walletData.notes];
                const noteIndex=updatedNotes.findIndex(n=>n.text===note.text);
                updatedNotes[noteIndex].amounts=li.amounts;
                await updateDoc(walletDoc,{notes:updatedNotes,balance:bal});
                calculateTotal();
            }
        };
        li.appendChild(editBtn);

        const delBtn=document.createElement('button');
        delBtn.textContent='DEL';
        delBtn.className='del-btn';
        delBtn.onclick=async()=>{
            const balanceCell=row.querySelector('.balance');
            li.amounts.forEach(a=>{
                const sign=a[0],val=parseFloat(a.slice(1));
                balanceCell.textContent=(parseFloat(balanceCell.textContent)-(sign==='+'?val:-val)).toFixed(2);
            });
            li.remove();
            const walletDoc=doc(db,"wallets",walletId);
            const updatedNotes=walletData.notes.filter(n=>n.text!==note.text);
            await updateDoc(walletDoc,{notes:updatedNotes,balance:parseFloat(balanceCell.textContent)});
            calculateTotal();
        };
        li.appendChild(delBtn);

        notesList.appendChild(li);
    });

    // Add button listeners for this row
    row.querySelector('.add-btn').onclick = () => handleTransfer(row,'add');
    row.querySelector('.sub-btn').onclick = () => handleTransfer(row,'subtract');
    row.querySelector('.del-row-btn').onclick = () => handleDeleteWallet(row);
}

// --- Handle Transfer ---
async function handleTransfer(row,type){
    const walletId=row.dataset.id;
    const balanceCell=row.querySelector('.balance');
    const amountInput=row.querySelector('input[type="number"]');
    const noteInput=row.querySelector('input[type="text"]');

    const amount=parseFloat(amountInput.value);
    const noteText=noteInput.value.trim();
    if(isNaN(amount)||!noteText){alert('Enter amount and note');return;}

    const walletDoc=doc(db,"wallets",walletId);
    const walletSnap=await getDoc(walletDoc);
    const walletData=walletSnap.exists()?walletSnap.data():{notes:[],balance:0};

    let currentBalance=parseFloat(balanceCell.textContent);
    currentBalance += (type==='add'?amount:-amount);
    balanceCell.textContent=currentBalance.toFixed(2);

    const notesArr=[...walletData.notes];
    const existingNote=notesArr.find(n=>n.text===noteText);
    if(existingNote){
        existingNote.amounts.push((type==='add'?'+':'-')+amount);
    }else{
        notesArr.push({text:noteText,amounts:[(type==='add'?'+':'-')+amount]});
    }
    await updateDoc(walletDoc,{notes:notesArr,balance:currentBalance});
    amountInput.value='';noteInput.value='';
}

// --- Delete Wallet ---
async function handleDeleteWallet(row){
    if(!confirm('Delete this wallet?')) return;
    const walletId=row.dataset.id;
    await deleteDoc(doc(db,"wallets",walletId));
    row.remove();
    calculateTotal();
}

// --- Add new wallet ---
async function addWallet(){
    const newWallet={name:'New Wallet',balance:0,currency:'USDT',notes:[]};
    await addDoc(walletsCol,newWallet);
}

// --- Realtime listener ---
onSnapshot(walletsCol,(snapshot)=>{
    const tbody=document.getElementById('walletTable').getElementsByTagName('tbody')[0];
    tbody.innerHTML='';
    snapshot.forEach(docSnap=>addWalletRow(docSnap.data(),docSnap.id));
    calculateTotal();
});

// --- Total balance ---
function calculateTotal(){
    let total=0;
    document.querySelectorAll('.balance').forEach(cell=>{
        let val=parseFloat(cell.textContent);
        if(!isNaN(val)) total+=val;
    });
    document.getElementById('totalBalance').textContent=total.toFixed(2);
}

// --- Make functions global for buttons ---
window.addWallet = addWallet;
</script>
</body>
</html>

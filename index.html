<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Wallet Tracker Ledger v10 - Firebase</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: top; }
    th { background-color: #4CAF50; color: white; font-weight: bold; }
    input { width: 100px; }
    button { cursor: pointer; }
    ul { margin: 0; padding-left: 20px; list-style-type: none; }
    li { margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
    .note-text { display: flex; flex: 1; }
    .note-amounts { font-weight: bold; width: 150px; text-align: right; margin-right: 10px; }
    .note-description { flex: 1; }
    .edit-btn { background-color: #2196F3; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-left: 5px; }
    .del-btn { background-color: #f44336; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-left: 5px; }
    .del-row-btn { background-color: #9c27b0; color: white; border: none; padding: 3px 7px; font-size: 12px; margin-left: 5px; }
    .move-up-btn { background-color: #ff9800; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-left: 5px; }
    .move-down-btn { background-color: #607d8b; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-left: 5px; }
    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-10px); }
        60% { transform: translateY(-5px); }
    }
    .header-bounce { 
        font-size: 16px; 
        font-weight: bold; 
        text-align: center; 
        margin-bottom: 20px; 
        animation: bounce 2s infinite; 
    }
</style>
</head>
<body>

<div class="header-bounce">Made By Capt Fahad | Powered By AI</div>

<h1>📊 Crypto Wallet Tracker Ledger v10 (Realtime)</h1>

<table id="walletTable">
    <thead>
        <tr>
            <th>Wallet / Account</th>
            <th>Balance</th>
            <th>Currency</th>
            <th>Notes / Transfers</th>
            <th>Transfer</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button onclick="addWallet()">➕ Add New Wallet</button>

<h2>Total Balance: $<span id="totalBalance">0</span></h2>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPgCWfTeRUebCCVeEwxnAXOWYX1dxwhZE",
  authDomain: "crypto-ledger-6d5fb.firebaseapp.com",
  projectId: "crypto-ledger-6d5fb",
  storageBucket: "crypto-ledger-6d5fb.firebasestorage.app",
  messagingSenderId: "344600389752",
  appId: "1:344600389752:web:aacb60ca86a397cd53658d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function updateNoteDisplay(li){
    const amountSpan = li.querySelector('.note-amounts');
    amountSpan.textContent = li.amounts.join(' ');
}

// ===== UPDATED EDIT BUTTON =====
function createEditButton(li, row){
    const editBtn = document.createElement('button');
    editBtn.textContent = 'Edit';
    editBtn.className = 'edit-btn';
    editBtn.onclick = ()=>{
        // Show current amounts and allow user to modify/delete/add
        const currentAmounts = li.amounts.join(',');
        let newAmounts = prompt(`Current amounts: ${currentAmounts}\n\nEdit amounts (comma-separated), leave blank to cancel:`, currentAmounts);
        if(newAmounts === null) return; // cancelled
        const parsed = newAmounts.split(',').map(a=>a.trim()).filter(a=>a).map(a=>{
            // ensure + or - sign
            if(!/^[+-]/.test(a)) a = (parseFloat(a)>=0?'+':'')+a;
            return a;
        });

        // Recalculate wallet balance
        const balanceCell = row.querySelector('.balance');
        let totalBalance = parseFloat(balanceCell.textContent) || 0;
        // subtract old amounts
        li.amounts.forEach(a=>{
            const val = parseFloat(a.replace(/[+-]/,''));
            totalBalance -= a.startsWith('+') ? val : -val;
        });
        // add new amounts
        parsed.forEach(a=>{
            const val = parseFloat(a.replace(/[+-]/,''));
            totalBalance += a.startsWith('+') ? val : -val;
        });
        balanceCell.textContent = totalBalance.toFixed(2);

        li.amounts = parsed;
        updateNoteDisplay(li);
        calculateTotal();
        saveAllWallets();
    };
    return editBtn;
}

// ... rest of the functions (moveRowUp, moveRowDown, calculateTotal, loadWalletsRealtime, saveAllWallets, addTransfer, deleteWalletRow, addWallet) stay exactly the same as v9 ...

</script>

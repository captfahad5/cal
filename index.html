<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Wallet Tracker Ledger v8 - Firebase</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: top; }
    th { background-color: #4CAF50; color: white; font-weight: bold; }
    input { width: 100px; }
    button { cursor: pointer; }
    ul { margin: 0; padding-left: 20px; list-style-type: none; }
    li { margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
    .note-text { display: flex; }
    .note-amounts {
        font-weight: bold;
        width: 150px;
        text-align: right;
        margin-right: 10px;
    }
    .note-description { flex: 1; }
    .edit-btn { background-color: #2196F3; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-right: 5px; }
    .del-btn { background-color: #f44336; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-left: 5px; }
    .del-row-btn { background-color: #9c27b0; color: white; border: none; padding: 3px 7px; font-size: 12px; margin-left: 5px; }
</style>
</head>
<body>

<h1>📊 Crypto Wallet Tracker Ledger v8 (Realtime)</h1>

<table id="walletTable">
    <thead>
        <tr>
            <th>Wallet / Account</th>
            <th>Balance</th>
            <th>Currency</th>
            <th>Notes / Transfers</th>
            <th>Transfer</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button onclick="addWallet()">➕ Add New Wallet</button>

<h2>Total Balance: $<span id="totalBalance">0</span></h2>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAPgCWfTeRUebCCVeEwxnAXOWYX1dxwhZE",
  authDomain: "crypto-ledger-6d5fb.firebaseapp.com",
  projectId: "crypto-ledger-6d5fb",
  storageBucket: "crypto-ledger-6d5fb.firebasestorage.app",
  messagingSenderId: "344600389752",
  appId: "1:344600389752:web:aacb60ca86a397cd53658d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function updateNoteDisplay(li){
    const amountSpan = li.querySelector('.note-amounts');
    amountSpan.textContent = li.amounts.join(' ');
}

function createEditButton(li, row){

    const editBtn = document.createElement('button');
    editBtn.textContent = 'Edit';
    editBtn.className = 'edit-btn';

    editBtn.onclick = ()=>{

        const newAmount = parseFloat(prompt('Enter amount:'));

        if(!isNaN(newAmount)){

            const type2 =
                confirm('OK = Add, Cancel = Subtract')
                ? 'add'
                : 'subtract';

            li.amounts.push(
                (type2 === 'add' ? '+' : '-') + newAmount
            );

            updateNoteDisplay(li);

            const balanceCell =
                row.querySelector('.balance');

            balanceCell.textContent = (
                parseFloat(balanceCell.textContent) +
                (type2 === 'add'
                    ? newAmount
                    : -newAmount)
            ).toFixed(2);

            calculateTotal();
            saveAllWallets();
        }
    };

    return editBtn;
}

function loadWalletsRealtime(){

    db.collection("wallets").onSnapshot(snapshot => {

        const tbody =
            document.querySelector("#walletTable tbody");

        tbody.innerHTML = "";

        snapshot.forEach(doc => {

            const data = doc.data();

            const row =
                tbody.insertRow();

            row.dataset.id = doc.id;

            row.innerHTML = `
                <td contenteditable="true">${data.name}</td>
                <td class="balance" contenteditable="true">${data.balance}</td>
                <td contenteditable="true">${data.currency}</td>
                <td class="notes"><ul></ul></td>
                <td>
                    <input type="number" placeholder="Amount">
                    <input type="text" placeholder="Note">
                    <button onclick="addTransfer(this,'add')">Add</button>
                    <button onclick="addTransfer(this,'subtract')">Subtract</button>
                    <button class="del-row-btn" onclick="deleteWalletRow(this)">DEL ROW</button>
                </td>
            `;

            const notesList =
                row.querySelector('.notes ul');

            if(data.notes){

                data.notes.forEach(note=>{

                    const li =
                        document.createElement('li');

                    li.dataset.note = note.text;

                    li.amounts =
                        note.amounts || [];

                    const wrapper =
                        document.createElement('span');

                    wrapper.className =
                        'note-text';

                    const amountSpan =
                        document.createElement('span');

                    amountSpan.className =
                        'note-amounts';

                    amountSpan.textContent =
                        li.amounts.join(' ');

                    const descSpan =
                        document.createElement('span');

                    descSpan.className =
                        'note-description';

                    descSpan.textContent =
                        `| ${note.text}`;

                    wrapper.appendChild(amountSpan);
                    wrapper.appendChild(descSpan);

                    li.appendChild(wrapper);

                    li.appendChild(
                        createEditButton(li, row)
                    );

                    const delBtn =
                        document.createElement('button');

                    delBtn.textContent = 'DEL';
                    delBtn.className = 'del-btn';

                    delBtn.onclick = ()=>{
                        li.remove();
                        saveAllWallets();
                    };

                    li.appendChild(delBtn);

                    notesList.appendChild(li);

                });
            }
        });

        calculateTotal();

    });
}

function saveAllWallets(){

    const rows =
        document.querySelectorAll(
            "#walletTable tbody tr"
        );

    rows.forEach(row=>{

        const id =
            row.dataset.id ||
            db.collection("wallets").doc().id;

        row.dataset.id = id;

        const name =
            row.cells[0].textContent;

        const balance =
            parseFloat(
                row.querySelector('.balance')
                    .textContent
            ) || 0;

        const currency =
            row.cells[2].textContent;

        const notes = [];

        row.querySelectorAll("li")
            .forEach(li=>{

                notes.push({
                    text: li.dataset.note,
                    amounts: li.amounts || []
                });

            });

        db.collection("wallets")
            .doc(id)
            .set({
                name,
                balance,
                currency,
                notes
            });

    });
}

function addTransfer(btn, type){

    const row =
        btn.parentElement.parentElement;

    const balanceCell =
        row.querySelector('.balance');

    const notesList =
        row.querySelector('.notes ul');

    const amountInput =
        row.querySelector(
            'input[type="number"]'
        );

    const noteInput =
        row.querySelector(
            'input[type="text"]'
        );

    const amount =
        parseFloat(amountInput.value);

    const noteText =
        noteInput.value.trim();

    if(isNaN(amount) || !noteText){

        alert(
            'Enter both a valid amount and note.'
        );

        return;
    }

    let currentBalance =
        parseFloat(
            balanceCell.textContent
        );

    currentBalance +=
        (type === 'add')
        ? amount
        : -amount;

    balanceCell.textContent =
        currentBalance.toFixed(2);

    let existingLi = null;

    notesList
        .querySelectorAll('li')
        .forEach(li=>{

            if(
                li.dataset.note
                === noteText
            ){
                existingLi = li;
            }

        });

    if(existingLi){

        existingLi.amounts.push(
            (type === 'add'
                ? '+'
                : '-') + amount
        );

        updateNoteDisplay(existingLi);

    }
    else{

        const li =
            document.createElement('li');

        li.dataset.note = noteText;

        li.amounts = [
            (type === 'add'
                ? '+'
                : '-') + amount
        ];

        const wrapper =
            document.createElement('span');

        wrapper.className =
            'note-text';

        const amountSpan =
            document.createElement('span');

        amountSpan.className =
            'note-amounts';

        amountSpan.textContent =
            li.amounts.join(' ');

        const descSpan =
            document.createElement('span');

        descSpan.className =
            'note-description';

        descSpan.textContent =
            `| ${noteText}`;

        wrapper.appendChild(amountSpan);
        wrapper.appendChild(descSpan);

        li.appendChild(wrapper);

        li.appendChild(
            createEditButton(li, row)
        );

        const delBtn =
            document.createElement('button');

        delBtn.textContent = 'DEL';

        delBtn.className =
            'del-btn';

        delBtn.onclick = ()=>{
            li.remove();
            saveAllWallets();
        };

        li.appendChild(delBtn);

        notesList.appendChild(li);

    }

    amountInput.value = '';
    noteInput.value = '';

    calculateTotal();
    saveAllWallets();
}

function deleteWalletRow(btn){

    if(confirm('Delete this wallet?')){

        const row =
            btn.parentElement.parentElement;

        const id =
            row.dataset.id;

        if(id){

            db.collection("wallets")
                .doc(id)
                .delete();
        }

        row.remove();

        calculateTotal();
    }
}

function calculateTotal(){

    let total = 0;

    document
        .querySelectorAll('.balance')
        .forEach(cell=>{

            let val =
                parseFloat(
                    cell.textContent
                );

            if(!isNaN(val))
                total += val;

        });

    document
        .getElementById(
            'totalBalance'
        )
        .textContent =
        total.toFixed(2);
}

function addWallet(){

    const table =
        document.querySelector(
            "#walletTable tbody"
        );

    const row =
        table.insertRow();

    row.innerHTML = `
        <td contenteditable="true">New Wallet</td>
        <td class="balance" contenteditable="true">0</td>
        <td contenteditable="true">USDT</td>
        <td class="notes"><ul></ul></td>
        <td>
            <input type="number" placeholder="Amount">
            <input type="text" placeholder="Note">
            <button onclick="addTransfer(this,'add')">Add</button>
            <button onclick="addTransfer(this,'subtract')">Subtract</button>
            <button class="del-row-btn" onclick="deleteWalletRow(this)">DEL ROW</button>
        </td>
    `;

    calculateTotal();
    saveAllWallets();
}

loadWalletsRealtime();

</script>

</body>
</html>

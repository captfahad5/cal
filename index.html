<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Wallet Tracker Ledger v8</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: top; }
    th { background-color: #4CAF50; color: white; font-weight: bold; }
    input { width: 100px; }
    button { cursor: pointer; }
    ul { margin: 0; padding-left: 20px; list-style-type: none; }
    li { margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
    .note-text { display: flex; }
    .note-amounts {
        font-weight: bold;
        width: 150px;  /* fixed width for ledger alignment */
        text-align: right;
        margin-right: 10px;
    }
    .note-description { flex: 1; }
    .edit-btn { background-color: #2196F3; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-right: 5px; }
    .del-btn { background-color: #f44336; color: white; border: none; padding: 2px 5px; font-size: 12px; margin-left: 5px; }
    .del-row-btn { background-color: #9c27b0; color: white; border: none; padding: 3px 7px; font-size: 12px; margin-left: 5px; }
</style>
</head>
<body>

<h1>📊 Crypto Wallet Tracker Ledger v8</h1>

<table id="walletTable">
    <thead>
        <tr>
            <th>Wallet / Account</th>
            <th>Balance</th>
            <th>Currency</th>
            <th>Notes / Transfers</th>
            <th>Transfer</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td contenteditable="true">Off Wallet (FHS)</td>
            <td class="balance" contenteditable="true">3000</td>
            <td contenteditable="true">USDT</td>
            <td class="notes"><ul></ul></td>
            <td>
                <input type="number" placeholder="Amount">
                <input type="text" placeholder="Note">
                <button onclick="addTransfer(this, 'add')">Add</button>
                <button onclick="addTransfer(this, 'subtract')">Subtract</button>
                <button class="del-row-btn" onclick="deleteWalletRow(this)">DEL ROW</button>
            </td>
        </tr>
    </tbody>
</table>

<button onclick="addWallet()">➕ Add New Wallet</button>

<h2>Total Balance: $<span id="totalBalance">0</span></h2>

<script>
// Add transfer
function addTransfer(btn, type) {
    const row = btn.parentElement.parentElement;
    const balanceCell = row.querySelector('.balance');
    const notesList = row.querySelector('.notes ul');

    const amountInput = row.querySelector('input[type="number"]');
    const noteInput = row.querySelector('input[type="text"]');

    const amount = parseFloat(amountInput.value);
    const noteText = noteInput.value.trim();

    if (isNaN(amount) || !noteText) {
        alert('Enter both a valid amount and note.');
        return;
    }

    // Update balance
    let currentBalance = parseFloat(balanceCell.textContent);
    currentBalance += (type === 'add') ? amount : -amount;
    balanceCell.textContent = currentBalance.toFixed(2);

    // Check if a note with same description already exists
    let existingLi = null;
    notesList.querySelectorAll('li').forEach(li => {
        if (li.dataset.note === noteText) existingLi = li;
    });

    if (existingLi) {
        // Append new amount to existing note
        existingLi.amounts.push((type === 'add' ? '+' : '-') + amount);
        updateNoteDisplay(existingLi);
    } else {
        // Create new note
        const li = document.createElement('li');
        li.dataset.note = noteText;
        li.amounts = [(type === 'add' ? '+' : '-') + amount]; // store all amounts

        // Note wrapper
        const noteWrapper = document.createElement('span');
        noteWrapper.className = 'note-text';

        const amountSpan = document.createElement('span');
        amountSpan.className = 'note-amounts';
        amountSpan.textContent = li.amounts.join(' ');

        const noteDescSpan = document.createElement('span');
        noteDescSpan.className = 'note-description';
        noteDescSpan.textContent = `| ${noteText}`;

        noteWrapper.appendChild(amountSpan);
        noteWrapper.appendChild(noteDescSpan);
        li.appendChild(noteWrapper);

        // Edit button
        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.className = 'edit-btn';
        editBtn.onclick = () => {
            const newAmount = parseFloat(prompt('Enter amount to add/subtract:'));
            if (!isNaN(newAmount)) {
                const type2 = confirm('Click OK for Add, Cancel for Subtract') ? 'add' : 'subtract';
                li.amounts.push((type2 === 'add' ? '+' : '-') + newAmount);
                updateNoteDisplay(li);
                balanceCell.textContent = (parseFloat(balanceCell.textContent) + (type2==='add'?newAmount:-newAmount)).toFixed(2);
                calculateTotal();
            }
        };
        li.appendChild(editBtn);

        // DEL button
        const delBtn = document.createElement('button');
        delBtn.textContent = 'DEL';
        delBtn.className = 'del-btn';
        delBtn.onclick = () => {
            li.amounts.forEach(a => {
                const sign = a[0];
                const val = parseFloat(a.slice(1));
                balanceCell.textContent = (parseFloat(balanceCell.textContent) - (sign==='+'?val:-val)).toFixed(2);
            });
            li.remove();
            calculateTotal();
        };
        li.appendChild(delBtn);

        notesList.appendChild(li);
    }

    amountInput.value = '';
    noteInput.value = '';
    calculateTotal();
}

// Update note display after editing
function updateNoteDisplay(li){
    const amountSpan = li.querySelector('.note-amounts');
    amountSpan.textContent = li.amounts.join(' ');
}

// Delete entire wallet row
function deleteWalletRow(btn) {
    if (confirm('Are you sure you want to delete this wallet?')) {
        const row = btn.parentElement.parentElement;
        const balanceCell = row.querySelector('.balance');
        let val = parseFloat(balanceCell.textContent);
        if (!isNaN(val)) {
            document.getElementById('totalBalance').textContent =
                (parseFloat(document.getElementById('totalBalance').textContent) - val).toFixed(2);
        }
        row.remove();
    }
}

// Calculate total balance
function calculateTotal() {
    let total = 0;
    document.querySelectorAll('.balance').forEach(cell => {
        let val = parseFloat(cell.textContent);
        if (!isNaN(val)) total += val;
    });
    document.getElementById('totalBalance').textContent = total.toFixed(2);
}

// Add new wallet
function addWallet() {
    const table = document.getElementById('walletTable').getElementsByTagName('tbody')[0];
    const row = table.insertRow();
    row.innerHTML = `
        <td contenteditable="true">New Wallet</td>
        <td class="balance" contenteditable="true">0</td>
        <td contenteditable="true">USDT</td>
        <td class="notes"><ul></ul></td>
        <td>
            <input type="number" placeholder="Amount">
            <input type="text" placeholder="Note">
            <button onclick="addTransfer(this, 'add')">Add</button>
            <button onclick="addTransfer(this, 'subtract')">Subtract</button>
            <button class="del-row-btn" onclick="deleteWalletRow(this)">DEL ROW</button>
        </td>
    `;
}

calculateTotal();
</script>

</body>
</html>
